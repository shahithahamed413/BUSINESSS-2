<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Messages | PowerFit Gym</title>
<link rel="stylesheet" href="css/style.css">

<style>
.admin-container {
    max-width:1200px;
    margin:50px auto;
    padding:20px;
}

.admin-container h1 {
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
    color:gold;
}

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.stat-box {
    background:#222;
    padding:25px;
    border-radius:10px;
    text-align:center;
}

.stat-box h3 {
    color:gold;
    font-size:32px;
    margin-bottom:10px;
}

.stat-box p {
    color:#aaa;
}

.messages-table {
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:40px;
}

.messages-table table {
    width:100%;
    border-collapse:collapse;
}

.messages-table th {
    background:#111;
    color:gold;
    padding:15px;
    text-align:left;
    font-weight:bold;
}

.messages-table td {
    padding:15px;
    border-bottom:1px solid #333;
    color:#ccc;
}

.messages-table tr:hover {
    background:#2a2a2a;
}

.messages-table a {
    color:gold;
    text-decoration:none;
    cursor:pointer;
}

.messages-table a:hover {
    text-decoration:underline;
}

.delete-btn {
    background:#dc3545;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:3px;
    cursor:pointer;
    font-size:12px;
    transition:background 0.3s;
}

.delete-btn:hover {
    background:#c82333;
}

.no-messages {
    text-align:center;
    padding:40px;
    color:#888;
}

.modal {
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.modal-content {
    background:#222;
    margin:5% auto;
    padding:30px;
    border:1px solid gold;
    border-radius:10px;
    width:90%;
    max-width:700px;
    max-height:80vh;
    overflow-y:auto;
}

.modal-content h2 {
    color:gold;
    margin-bottom:20px;
}

.modal-content p {
    margin-bottom:15px;
    line-height:1.6;
    color:#ccc;
}

.modal-content strong {
    color:gold;
}

.close-btn {
    color:#aaa;
    float:right;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

.close-btn:hover {
    color:white;
}

.refresh-btn {
    background:gold;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    margin-bottom:20px;
    transition:background 0.3s;
}

.refresh-btn:hover {
    background:#ffd700;
}

.server-status {
    padding:15px;
    border-radius:5px;
    margin-bottom:20px;
    text-align:center;
    font-weight:bold;
}

.server-status.online {
    background:#28a745;
    color:white;
}

.server-status.offline {
    background:#dc3545;
    color:white;
}

@media(max-width:768px) {
    .admin-container {
        padding:15px;
    }

    .messages-table table {
        font-size:12px;
    }

    .messages-table th,
    .messages-table td {
        padding:10px;
    }
}
</style>
</head>
<body>

<div class="admin-container">

    <h1>📧 Admin Panel - Messages</h1>

    <div id="serverStatus" class="server-status offline">
        🔴 Server Status: Checking...
    </div>

    <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh Messages</button>

    <div class="stats">
        <div class="stat-box">
            <h3 id="totalMessages">0</h3>
            <p>Total Messages</p>
        </div>
        <div class="stat-box">
            <h3 id="todayMessages">0</h3>
            <p>Messages Today</p>
        </div>
    </div>

    <div class="messages-table">
        <div id="messagesContainer"></div>
    </div>

</div>

<!-- Message Details Modal -->
<div id="messageModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="messageDetails"></div>
    </div>
</div>

<script>
const API_URL = 'http://localhost:3000';

// Check server status on load
window.addEventListener('load', () => {
    checkServerStatus();
    loadMessages();
});

// Check if server is online
async function checkServerStatus() {
    try {
        const response = await fetch(API_URL + '/api/messages');
        if (response.ok) {
            document.getElementById('serverStatus').textContent = '🟢 Server Status: Online';
            document.getElementById('serverStatus').className = 'server-status online';
        }
    } catch (error) {
        document.getElementById('serverStatus').textContent = '🔴 Server Status: Offline - Make sure server is running';
        document.getElementById('serverStatus').className = 'server-status offline';
    }
}

// Load and display messages
async function loadMessages() {
    try {
        const response = await fetch(API_URL + '/api/messages');
        
        if (!response.ok) {
            throw new Error('Failed to fetch messages');
        }

        const result = await response.json();
        const messages = result.data || [];

        // Update total count
        document.getElementById('totalMessages').textContent = messages.length;

        // Count messages from today
        const today = new Date().toDateString();
        const todayCount = messages.filter(msg => 
            new Date(msg.timestamp).toDateString() === today
        ).length;
        document.getElementById('todayMessages').textContent = todayCount;

        // Display messages in table
        const container = document.getElementById('messagesContainer');

        if (messages.length === 0) {
            container.innerHTML = '<div class="no-messages">No messages received yet.</div>';
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Date/Time</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;

        // Display messages in reverse order (newest first)
        messages.reverse().forEach(msg => {
            html += `
                <tr>
                    <td>${escapeHtml(msg.name)}</td>
                    <td>${escapeHtml(msg.email)}</td>
                    <td><a onclick="viewMessage(${msg.id})">${escapeHtml(msg.subject)}</a></td>
                    <td>${msg.timestamp}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteMessage(${msg.id})">Delete</button>
                    </td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        `;

        container.innerHTML = html;
    } catch (error) {
        console.error('Error loading messages:', error);
        document.getElementById('messagesContainer').innerHTML = 
            '<div class="no-messages">⚠️ Error loading messages. Make sure the server is running on port 3000.</div>';
    }
}

// View message details
function viewMessage(messageId) {
    fetch(`${API_URL}/api/messages/${messageId}`)
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                const msg = result.data;
                const detailsHtml = `
                    <h2>Message Details</h2>
                    <p><strong>From:</strong> ${escapeHtml(msg.name)}</p>
                    <p><strong>Email:</strong> <a href="mailto:${msg.email}">${escapeHtml(msg.email)}</a></p>
                    <p><strong>Phone:</strong> ${escapeHtml(msg.phone)}</p>
                    <p><strong>Subject:</strong> ${escapeHtml(msg.subject)}</p>
                    <p><strong>Date/Time:</strong> ${msg.timestamp}</p>
                    <hr style="border:1px solid #444;margin:20px 0;">
                    <p><strong>Message:</strong></p>
                    <p style="white-space:pre-wrap;background:#1a1a1a;padding:15px;border-radius:5px;">
                        ${escapeHtml(msg.message)}
                    </p>
                `;
                document.getElementById('messageDetails').innerHTML = detailsHtml;
                document.getElementById('messageModal').style.display = 'block';
            }
        })
        .catch(error => console.error('Error fetching message:', error));
}

// Delete message
async function deleteMessage(messageId) {
    if (confirm('Are you sure you want to delete this message?')) {
        try {
            const response = await fetch(`${API_URL}/api/messages/${messageId}`, {
                method: 'DELETE'
            });

            const result = await response.json();

            if (result.success) {
                alert('Message deleted successfully');
                loadMessages();
            } else {
                alert('Error deleting message');
            }
        } catch (error) {
            console.error('Error deleting message:', error);
            alert('Error deleting message');
        }
    }
}

// Close modal
function closeModal() {
    document.getElementById('messageModal').style.display = 'none';
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('messageModal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}
</script>

</body>
</html>
