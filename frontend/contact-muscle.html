<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle Gain Plan Enquiry | PowerFit Gym</title>
<link rel="stylesheet" href="css/style.css">

<style>
.contact-section {
    max-width:1000px;
    margin:50px auto;
    padding:20px;
}

.contact-section h1 {
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
    color:gold;
}

.contact-section p {
    text-align:center;
    margin-bottom:40px;
    color:#aaa;
    font-size:16px;
}

.contact-form {
    background:#222;
    padding:30px;
    border-radius:10px;
    max-width:600px;
    margin:0 auto;
}

.contact-form h2 {
    color:gold;
    margin-bottom:25px;
    font-size:24px;
}

.form-group {
    margin-bottom:20px;
}

.form-group label {
    display:block;
    margin-bottom:8px;
    color:#ccc;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width:100%;
    padding:12px;
    border:1px solid #444;
    border-radius:5px;
    background:#333;
    color:white;
    font-family:Arial,sans-serif;
    font-size:14px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
    outline:none;
    border-color:gold;
    box-shadow:0 0 5px rgba(255,215,0,0.3);
}

.form-group textarea {
    resize:vertical;
    min-height:120px;
}

.submit-btn {
    width:100%;
    padding:12px;
    background:gold;
    color:black;
    border:none;
    border-radius:5px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:1px;
    transition:background 0.3s;
}

.submit-btn:hover {
    background:#ffd700;
}

#form-message {
    padding:12px;
    margin-bottom:15px;
    border-radius:5px;
    display:none;
    font-size:14px;
    text-align:center;
}

#form-message.success {
    background:#28a745;
    color:white;
    display:block;
}

#form-message.error {
    background:#dc3545;
    color:white;
    display:block;
}

.submit-btn:disabled {
    background:#999;
    cursor:not-allowed;
    opacity:0.7;
}

@media(max-width:768px) {
    .contact-section {
        padding:15px;
    }

    .contact-section h1 {
        font-size:30px;
    }
}
</style>
</head>
<body>

<nav>
    <h2>POWERFIT GYM</h2>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="plans.html">Plans</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="contact-section">

    <h1>Muscle Gain Plan Enquiry</h1>
    <p>Ready to build muscle? Fill out the form below and our trainers will contact you!</p>

    <div class="contact-form">
        <h2>Muscle Gain Plan Form</h2>

        <div id="form-message"></div>

        <form id="muscleForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="18" required>
            </div>

            <div class="form-group">
                <label for="experience">Weightlifting Experience</label>
                <select id="experience" name="experience" required>
                    <option value="">Select your experience level</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>

            <div class="form-group">
                <label for="currentWeight">Current Weight (kg)</label>
                <input type="number" id="currentWeight" name="currentWeight" placeholder="e.g., 75">
            </div>

            <div class="form-group">
                <label for="targetWeight">Target Weight (kg)</label>
                <input type="number" id="targetWeight" name="targetWeight" placeholder="e.g., 85">
            </div>

            <div class="form-group">
                <label for="goals">Muscle Building Goals</label>
                <textarea id="goals" name="goals" placeholder="Tell us which muscle groups you want to focus on..." required></textarea>
            </div>

            <div class="form-group">
                <label for="message">Additional Comments</label>
                <textarea id="message" name="message" placeholder="Any injuries or concerns we should know about?"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Enquiry</button>
        </form>
    </div>

</section>

<footer>
    <p>© 2026 PowerFit Gym. All Rights Reserved.</p>
</footer>

<script>
document.getElementById('muscleForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('form-message');
    
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    const formData = {
        plan: 'Muscle Gain Plan',
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        age: document.getElementById('age').value.trim(),
        experience: document.getElementById('experience').value.trim(),
        currentWeight: document.getElementById('currentWeight').value.trim(),
        targetWeight: document.getElementById('targetWeight').value.trim(),
        goals: document.getElementById('goals').value.trim(),
        message: document.getElementById('message').value.trim()
    };

    try {
        const response = await fetch('http://localhost:3000/api/contact', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (response.ok && result.success) {
            formMessage.textContent = '✓ ' + result.message;
            formMessage.className = 'success';
            document.getElementById('muscleForm').reset();
            setTimeout(() => {
                formMessage.style.display = 'none';
            }, 5000);
        } else {
            formMessage.textContent = '✗ ' + (result.message || 'Failed to send message');
            formMessage.className = 'error';
        }
    } catch (error) {
        console.error('Error:', error);
        formMessage.textContent = '✗ Could not connect to server. Make sure the server is running on http://localhost:3000';
        formMessage.className = 'error';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Enquiry';
    }
});
</script>

</body>
</html>
