name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: powerfit_gym
      DB_USER: postgres
      DB_PASSWORD: shahith
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: powerfit_gym
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: shahith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install
      - name: Run tests
        working-directory: ./backend
        run: npm test
      - name: Frontend build
        working-directory: ./frontend
        run: npm install && npm run build

